name: Build Kivy APK

on:
    workflow_dispatch:
    push:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install system dependencies
              run: |
                  sudo apt update
                  sudo apt install -y git zip unzip openjdk-17-jdk \
                    autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
                    libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

            - name: Install Buildozer
              run: |
                  python -m pip install --upgrade pip
                  pip install buildozer cython

            - name: Setup Android SDK
              run: |
                  mkdir -p $HOME/android-sdk/cmdline-tools
                  cd $HOME/android-sdk

                  wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
                  unzip cmdline.zip -d cmdline-tools
                  mv cmdline-tools/cmdline-tools cmdline-tools/latest

                  export ANDROID_HOME=$HOME/android-sdk
                  export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

                  yes | sdkmanager --licenses

                  sdkmanager "platform-tools"
                  sdkmanager "platforms;android-33"
                  sdkmanager "build-tools;33.0.2"

            - name: Build APK with Buildozer
              run: |
                  export ANDROID_HOME=$HOME/android-sdk
                  export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH:$PATH

                  buildozer -v android debug

            - name: Upload APK
              uses: actions/upload-artifact@v4
              with:
                  name: apk
                  path: bin/*.apk
