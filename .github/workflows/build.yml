name: Build APK KivyMD (Stable Buildozer)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget openjdk-17-jdk \
          python3-pip build-essential autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev

      # 4. Install Buildozer
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 5. Setup Android SDK (FIX STABLE + AIDL FIX)
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform

          # Command line tools (stable version)
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip

          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest

          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

          # Accept licenses (IMPORTANT FIX)
          yes | sdkmanager --licenses || true

          # Install stable components ONLY (avoid build-tools 37)
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-31"
          sdkmanager "build-tools;31.0.0"

          # Verify AIDL exists
          echo "Checking build-tools..."
          ls $ANDROID_SDK_ROOT/build-tools/31.0.0 || true

      # 6. Build APK
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      # 7. Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivymd-apk
          path: bin/*.apk